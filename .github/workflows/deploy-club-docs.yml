name: Deploy Club Pages

on:
  push:
    tags:
      - club-v*
    paths:
      - "apps/web-app/**"
      - "apps/docs/**"
      - "packages/infra/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-club-docs.yml"
  workflow_dispatch: {}

concurrency:
  group: club-pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.repository == 'hashpass-tech/hashpass.tech'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build club and docs artifact
        run: pnpm --filter @hashpass/infra run build:club-docs-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site-artifacts/club-docs

  deploy:
    if: github.repository == 'hashpass-tech/hashpass.tech'
    needs: build
    runs-on: ubuntu-latest
    environment:
      # Use a dedicated Pages environment so tag-triggered club releases are not
      # blocked by the repo's branch-restricted github-pages policy.
      name: club-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
