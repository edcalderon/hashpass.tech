name: Deploy Infra

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "packages/infra/**"
      - "apps/mobile-app/app/api/**"
      - "apps/mobile-app/lib/**"
      - "apps/mobile-app/config/**"
      - "packages/auth/**"
      - "packages/config/**"
      - "packages/tools/scripts/deploy-api-lambda.sh"
      - "packages/tools/scripts/package-lambda.sh"
      - "packages/types/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/infra-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    if: github.repository == 'hashpass-tech/hashpass.tech'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      HASHPASS_INFRA_TARGET: bsl
      AWS_WEB_PIPELINE_ROLE_ARN: ${{ vars.AWS_WEB_PIPELINE_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "pnpm"

      - name: Setup Bun for SST
        run: |
          npm install --global bun@1.2.23
          bun --version

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --no-frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.AWS_INFRA_DEPLOY_ROLE_ARN }}
          role-session-name: hashpass-infra

      - name: Deploy production
        if: github.ref_name == 'main'
        run: pnpm --filter @hashpass/infra run deploy:prod

      - name: Deploy development
        if: github.ref_name == 'develop'
        run: pnpm --filter @hashpass/infra run deploy:dev

      - name: Validate target API deploy role
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        run: |
          set -euo pipefail

          if [ -z "${AWS_WEB_PIPELINE_ROLE_ARN:-}" ]; then
            echo "Missing AWS_WEB_PIPELINE_ROLE_ARN. Set the GitHub repo variable to the target-account web pipeline role."
            exit 1
          fi

      - name: Configure target AWS credentials for API Lambda
        if: github.ref_name == 'main' || github.ref_name == 'develop'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ env.AWS_WEB_PIPELINE_ROLE_ARN }}
          role-session-name: hashpass-api-lambda-deploy

      - name: Deploy production API Lambda
        if: github.ref_name == 'main'
        env:
          SITE_LAMBDA_FUNCTION_NAME: hashpass-prod-expo-router-api
          SITE_LAMBDA_REGION: us-east-1
          SITE_API_VERSION_URL: https://api.hashpass.tech/api/config/versions
        run: bash packages/tools/scripts/deploy-api-lambda.sh

      - name: Deploy development API Lambda
        if: github.ref_name == 'develop'
        env:
          SITE_LAMBDA_FUNCTION_NAME: hashpass-dev-expo-router-api
          SITE_LAMBDA_REGION: us-east-1
          SITE_API_VERSION_URL: https://api-dev.hashpass.tech/api/config/versions
        run: bash packages/tools/scripts/deploy-api-lambda.sh
