name: Mobile Android Release
run-name: Mobile Android Release - ${{ inputs.environment }}/${{ inputs.track }} - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Release environment
        required: true
        default: production
        type: choice
        options:
          - production
          - development
      track:
        description: Google Play track
        required: true
        default: production
        type: choice
        options:
          - production
          - alpha
          - beta
          - internal
      release_status:
        description: Google Play release status
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
          - halted
          - inProgress
      backend:
        description: Release backend
        required: true
        default: fastlane
        type: choice
        options:
          - fastlane
          - eas
      runner:
        description: 'Build runner — aws-ec2 uses the self-hosted EC2 instance, github-hosted uses GitHub Actions infrastructure'
        required: false
        default: aws-ec2
        type: choice
        options:
          - aws-ec2
          - github-hosted

concurrency:
  group: mobile-android-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Resolves the runner label array from the human-readable input so that
  # the release job can use fromJSON() on a single output string.
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - id: pick
        run: |
          if [ "${{ inputs.runner }}" = "github-hosted" ]; then
            echo 'runner=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner=["self-hosted","linux","x64","hashpass-mobile-release"]' >> "$GITHUB_OUTPUT"
          fi

  # Blocks closed alpha until the matching internal release has already succeeded
  # for the same tag. This keeps version codes in release order and avoids drift
  # between internal and closed testing tracks.
  require-internal-before-alpha:
    runs-on: ubuntu-latest
    if: inputs.environment == 'production' && inputs.track == 'alpha'
    permissions:
      actions: read
      contents: read
    steps:
      - name: Require a successful internal release first
        uses: actions/github-script@v7
        with:
          script: |
            const refName = context.ref_name;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'mobile-android-release.yml',
                head_sha: context.sha,
                per_page: 100,
              }
            );

            const internalRun = runs.find((run) => {
              const title = run.display_title || run.displayTitle || run.name || '';
              return run.event === 'workflow_dispatch' &&
                run.conclusion === 'success' &&
                title.includes('development/internal') &&
                title.includes(refName);
            });

            if (!internalRun) {
              core.setFailed(
                [
                  `Blocked alpha release for ${refName}.`,
                  'Run the internal release first with environment=development, wait for success,',
                  'then rerun the alpha release so internal and closed testing stay in sync.',
                ].join(' ')
              );
            }

  # Wakes the EC2 runner before the release job runs.
  # Requires three GitHub variables: AWS_RUNNER_ROLE_ARN, EC2_RUNNER_INSTANCE_ID, AWS_RUNNER_REGION.
  # Skipped automatically when using github-hosted runner or when variables are not yet configured.
  # Set up: run terraform apply with enable_github_actions_runner_control=true, then copy the
  # github_actions_role_arn output as GitHub variable AWS_RUNNER_ROLE_ARN.
  start-runner:
    needs: [require-internal-before-alpha]
    runs-on: ubuntu-latest
    if: always() && (needs.require-internal-before-alpha.result == 'success' || needs.require-internal-before-alpha.result == 'skipped') && inputs.runner != 'github-hosted' && vars.AWS_RUNNER_ROLE_ARN != '' && vars.EC2_RUNNER_INSTANCE_ID != ''
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RUNNER_ROLE_ARN }}
          aws-region: ${{ vars.AWS_RUNNER_REGION || 'us-east-1' }}

      - name: Start EC2 instance
        env:
          INSTANCE_ID: ${{ vars.EC2_RUNNER_INSTANCE_ID }}
        run: |
          set -euo pipefail
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          echo "Instance $INSTANCE_ID is: $STATE"
          case "$STATE" in
            running)
              echo "Already running." ;;
            stopped)
              aws ec2 start-instances --instance-ids "$INSTANCE_ID"
              aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
              echo "Instance started." ;;
            stopping)
              aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
              aws ec2 start-instances --instance-ids "$INSTANCE_ID"
              aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
              echo "Instance started." ;;
            *)
              echo "Unexpected instance state: $STATE" >&2; exit 1 ;;
          esac

      - name: Wait for runner to come online
        run: |
          # GitHub queues the release job and dispatches it once the runner registers.
          # 75s covers EC2 boot + runner service start on a cold instance. Polling the
          # runners API requires manage_runners:org which GITHUB_TOKEN can't hold in
          # org repos — a fixed sleep is simpler and reliable.
          echo "EC2 started. Waiting 75s for runner service to register..."
          sleep 75
          echo "Done waiting — GitHub will dispatch the release job when the runner is online."

  release:
    needs: [select-runner, start-runner, require-internal-before-alpha]
    if: always() && github.repository == 'hashpass-tech/hashpass.tech' && needs.select-runner.result == 'success' && needs.require-internal-before-alpha.result != 'failure' && (needs.start-runner.result == 'success' || needs.start-runner.result == 'skipped')
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner) }}
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CI: '1'
      MOBILE_RELEASE_BACKEND: ${{ inputs.backend }}
      MOBILE_RELEASE_ENV: ${{ inputs.environment }}
      MOBILE_RELEASE_TRACK: ${{ inputs.environment == 'development' && 'internal' || inputs.track }}
      FASTLANE_RELEASE_STATUS: ${{ inputs.release_status }}
      ANDROID_UPLOAD_KEY_SHA1: ${{ vars.ANDROID_UPLOAD_KEY_SHA1 }}
      GOOGLE_PLAY_JSON_KEY: ${{ github.workspace }}/.runner-secrets/google-play-service-account.json
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.runner-secrets/hashpass-release.keystore
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_TOKEN_DEV: ${{ secrets.EXPO_TOKEN_DEV }}
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}
      EAS_PROJECT_ID_DEV: ${{ vars.EAS_PROJECT_ID_DEV }}
      EXPO_OWNER: ${{ vars.EXPO_OWNER }}
      EXPO_OWNER_DEV: ${{ vars.EXPO_OWNER_DEV }}
      # Supabase public config — embedded into the JS bundle by Metro at build time.
      # Add EXPO_PUBLIC_SUPABASE_URL_DEV / _PROD and EXPO_PUBLIC_SUPABASE_ANON_KEY_DEV / _PROD
      # as GitHub Variables (Settings → Secrets and variables → Variables).
      EXPO_PUBLIC_SUPABASE_PROFILE: ${{ inputs.environment == 'development' && 'core-development' || 'core-production' }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ inputs.environment == 'development' && vars.EXPO_PUBLIC_SUPABASE_URL_DEV || vars.EXPO_PUBLIC_SUPABASE_URL_PROD }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ inputs.environment == 'development' && vars.EXPO_PUBLIC_SUPABASE_ANON_KEY_DEV || vars.EXPO_PUBLIC_SUPABASE_ANON_KEY_PROD }}
      EXPO_PUBLIC_DIRECTUS_URL: ${{ vars.EXPO_PUBLIC_DIRECTUS_URL }}
      # Used by getSupabaseOAuthRedirectUrl as the web-relay origin for native OAuth
      # and magic-link callbacks. Without this, the polyfilled window.location.origin
      # (localhost:8081 from Metro) gets embedded in the OAuth redirect URL.
      EXPO_PUBLIC_SITE_URL: https://hashpass.tech
      # Directus is the primary auth provider for native. EXPO_PUBLIC_ prefix is required
      # so Metro inlines it into the React Native JS bundle (non-prefixed vars are
      # Node.js-only and undefined at app runtime). Supabase credentials are still bundled
      # so magic-link / OTP flows (supabase.auth.signInWithOtp) work alongside Directus OAuth.
      EXPO_PUBLIC_AUTH_PROVIDER: directus
      AUTH_PROVIDER: directus
      # Native Google Sign-In feature flag. Set EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN=true in
      # GitHub Actions Variables (Settings → Secrets and variables → Variables) to activate
      # the SDK account-picker flow. Omit or set false to keep the browser-based fallback.
      EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN: ${{ vars.EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      # GitHub Actions blocks setting NODE_OPTIONS via $GITHUB_ENV for security reasons so this
      # must live here. Metro bundler OOM'd at 2036/2048 MiB on a large bundle, so we give Node
      # 3072 MiB; Gradle is tuned down to 2048 MiB in "Tune build memory limits" to compensate
      # (total stays ≤5632 MiB, leaving ~2.2 GiB for OS + runner on 8 GiB EC2 instances).
      NODE_OPTIONS: '--max-old-space-size=3072'
      # Metro transform cache — persisted on EC2 EBS so file-level transforms are skipped between runs.
      # metro.config.js reads this and configures FileStore accordingly.
      METRO_CACHE_DIR: '/home/runner/.metro-cache'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Preserve gitignored dirs (android/, node_modules/) across runs so Gradle
          # can do incremental builds. Non-gitignored untracked files are cleaned below.
          clean: false

      - name: Clean workspace
        run: |
          set -euo pipefail
          # Remove untracked, non-gitignored files left from the previous run.
          # -ffd (no -x) keeps gitignored dirs like android/ and node_modules/ intact
          # so Gradle incremental builds survive across EC2 runs.
          git clean -ffd

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          # On EC2, pnpm store lives on persistent EBS — skip GitHub's remote cache
          # to avoid a ~2 min cache-upload in "Post Setup Node" that helps no one.
          cache: ${{ inputs.runner == 'github-hosted' && 'pnpm' || '' }}

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache Gradle wrapper + dependency cache + incremental build cache.
      # Only needed on GitHub-hosted runners — on EC2, ~/.gradle persists on disk between runs.
      # Key includes the lock file so NDK/RN native outputs are reused across patch bumps.
      - name: Cache Gradle
        if: inputs.runner == 'github-hosted'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile-app/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install EAS CLI
        if: inputs.backend == 'eas'
        run: |
          set -euo pipefail

          if ! command -v eas >/dev/null 2>&1; then
            npm install -g eas-cli@20.1.0
          fi

          eas --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          LOCK_HASH=$(sha256sum pnpm-lock.yaml | cut -d' ' -f1)
          HASH_FILE="$HOME/.gradle/.pnpm-lock-hash"
          STORED=$(cat "$HASH_FILE" 2>/dev/null || echo "none")
          if [ "$LOCK_HASH" = "$STORED" ] && [ -d node_modules ]; then
            echo "pnpm-lock.yaml unchanged and node_modules present — skipping install."
          else
            pnpm install --frozen-lockfile --prefer-offline
            printf '%s' "$LOCK_HASH" > "$HASH_FILE"
          fi

      - name: Materialize Google Play service account
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "Missing required environment variable: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

          mkdir -p "$(dirname "$GOOGLE_PLAY_JSON_KEY")" config
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$GOOGLE_PLAY_JSON_KEY"
          cp "$GOOGLE_PLAY_JSON_KEY" config/hashpass-eas.json
          chmod 600 "$GOOGLE_PLAY_JSON_KEY" config/hashpass-eas.json

      - name: Resolve fastlane signing secrets from Expo
        if: inputs.backend == 'fastlane'
        env:
          MOBILE_RELEASE_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const { spawnSync } = require('child_process');

          void (async () => {
            const appConfig = require('./apps/mobile-app/app.json').expo;
            const applicationIdentifier = appConfig.android.package;
            const projectIdCandidates =
              process.env.MOBILE_RELEASE_ENV === 'development'
                ? [process.env.EAS_PROJECT_ID_DEV, process.env.EAS_PROJECT_ID]
                : [process.env.EAS_PROJECT_ID, process.env.EAS_PROJECT_ID_DEV];
            const projectIds = projectIdCandidates.filter(
              value => typeof value === 'string' && value.trim()
            );
            const preferredTokens =
              process.env.MOBILE_RELEASE_ENV === 'development'
                ? [process.env.EXPO_TOKEN_DEV, process.env.EXPO_TOKEN]
                : [process.env.EXPO_TOKEN, process.env.EXPO_TOKEN_DEV];
            const tokens = preferredTokens.filter(token => typeof token === 'string' && token.trim());

            if (!projectIds.length) {
              throw new Error('No EAS project ID is available for fastlane signing export.');
            }
            if (!tokens.length) {
              throw new Error('No Expo authentication token is available for fastlane signing export.');
            }

            const appQuery = `
              query AppByIdQuery($appId: String!) {
                app {
                  byId(appId: $appId) {
                    id
                    fullName
                  }
                }
              }
            `;

            const credentialsQuery = `
              query CommonAndroidAppCredentialsWithBuildCredentialsByApplicationIdentifierQuery(
                $projectFullName: String!
                $applicationIdentifier: String
                $legacyOnly: Boolean
              ) {
                app {
                  byFullName(fullName: $projectFullName) {
                    id
                    androidAppCredentials(
                      filter: {
                        applicationIdentifier: $applicationIdentifier
                        legacyOnly: $legacyOnly
                      }
                    ) {
                      id
                      applicationIdentifier
                      androidAppBuildCredentialsList {
                        id
                        isDefault
                        isLegacy
                        name
                        androidKeystore {
                          id
                          keystore
                          keystorePassword
                          keyAlias
                          keyPassword
                        }
                      }
                    }
                  }
                }
              }
            `;

            async function runGraphql(token, query, variables) {
              const response = await fetch('https://api.expo.dev/graphql', {
                method: 'POST',
                headers: {
                  'content-type': 'application/json',
                  authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({ query, variables }),
              });

              const payload = await response.json();
              if (!response.ok || payload.errors?.length) {
                const message = payload.errors?.map(error => error.message).join('; ')
                  || `Expo GraphQL request failed with HTTP ${response.status}`;
                throw new Error(message);
              }

              return payload.data;
            }

            function normalizeFingerprint(value) {
              return String(value || '').replace(/\s+/g, '').toUpperCase();
            }

            function extractFingerprint(stdout) {
              const match = String(stdout || '').match(/SHA1:\s*([A-F0-9:]+)/i);
              return match ? normalizeFingerprint(match[1]) : null;
            }

            function fingerprintKeystore(keystore, label) {
              const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), 'hashpass-expo-keystore-'));
              const keystorePath = path.join(tempDir, 'keystore.jks');

              try {
                fs.writeFileSync(keystorePath, Buffer.from(keystore.keystore, 'base64'));
                const keytoolArgs = [
                  '-list',
                  '-v',
                  '-keystore',
                  keystorePath,
                  '-storepass',
                  keystore.keystorePassword,
                ];
                const result = spawnSync('keytool', keytoolArgs, { encoding: 'utf8' });

                if (result.error) {
                  throw result.error;
                }

                if (result.status !== 0) {
                  throw new Error(
                    `keytool failed for Expo build credential ${label}: ${String(result.stderr || result.stdout || '').trim()}`,
                  );
                }

                const fingerprint = extractFingerprint(result.stdout);
                if (!fingerprint) {
                  throw new Error(`Unable to read SHA-1 fingerprint for Expo build credential ${label}`);
                }

                return fingerprint;
              } finally {
                fs.rmSync(tempDir, { recursive: true, force: true });
              }
            }

            async function fetchCredentials(token, projectId) {
              const app = await runGraphql(token, appQuery, { appId: projectId });
              const projectFullName = app?.app?.byId?.fullName;
              if (!projectFullName) {
                throw new Error(`Expo project lookup failed for project ID ${projectId}`);
              }

              const credentials = await runGraphql(token, credentialsQuery, {
                projectFullName,
                applicationIdentifier,
                legacyOnly: false,
              });

              const appNode = credentials?.app?.byFullName;
              const appCredentials = appNode?.androidAppCredentials?.[0];
              const buildCredentialsList = appCredentials?.androidAppBuildCredentialsList ?? [];
              const buildCredentials = buildCredentialsList.filter(entry => entry?.androidKeystore);

              if (!buildCredentials.length) {
                throw new Error(
                  `No Android keystore was found in Expo for ${projectFullName} (${applicationIdentifier})`
                );
              }

              const expectedUploadKeySha1 = normalizeFingerprint(process.env.ANDROID_UPLOAD_KEY_SHA1);
              let selectedBuildCredentials = buildCredentials.find(entry => entry.isDefault) ?? buildCredentials[0];

              if (expectedUploadKeySha1) {
                const fingerprintedCredentials = buildCredentials.map(entry => ({
                  entry,
                  fingerprint: fingerprintKeystore(entry.androidKeystore, entry.name),
                }));
                const fingerprintMatch = fingerprintedCredentials.find(
                  candidate => candidate.fingerprint === expectedUploadKeySha1,
                );

                if (!fingerprintMatch) {
                  const availableFingerprints = fingerprintedCredentials
                    .map(candidate => `${candidate.entry.name}=${candidate.fingerprint}`)
                    .join(', ');
                  throw new Error(
                    `No Expo Android build credential for ${projectFullName} matches ANDROID_UPLOAD_KEY_SHA1=${expectedUploadKeySha1}. ` +
                      `Available fingerprints: ${availableFingerprints || 'none'}`,
                  );
                }

                selectedBuildCredentials = fingerprintMatch.entry;
              }

              const keystore = selectedBuildCredentials.androidKeystore;
              const envFile = process.env.GITHUB_ENV;
              if (!envFile) {
                throw new Error('GITHUB_ENV is not set');
              }

              const envEntries = [
                ['ANDROID_KEYSTORE_BASE64', keystore.keystore],
                ['ANDROID_KEYSTORE_' + 'PASSWORD', keystore.keystorePassword],
                ['ANDROID_KEY_ALIAS', keystore.keyAlias],
                ['ANDROID_KEY_' + 'PASSWORD', keystore.keyPassword ?? ''],
              ];

              for (const [, value] of envEntries) {
                if (value) process.stdout.write(`::add-mask::${value}\n`);
              }

              fs.appendFileSync(
                envFile,
                envEntries.map(([name, value]) => `${name}=${value}`).join('\n') + '\n'
              );

              console.log(
                `Exported Android keystore for ${projectFullName} from Expo build credentials: ${selectedBuildCredentials.name}`
              );
            }

            let lastError = null;
            for (const token of tokens) {
              for (const projectId of projectIds) {
                try {
                  await fetchCredentials(token, projectId);
                  return;
                } catch (error) {
                  lastError = error;
                }
              }
            }

            throw lastError ?? new Error('Failed to export Android keystore from Expo');
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Setup Ruby
        if: inputs.backend == 'fastlane'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile-app

      - name: Materialize fastlane secrets
        if: inputs.backend == 'fastlane'
        run: |
          set -euo pipefail
          required_envs=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
          )

          for name in "${required_envs[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required environment variable: $name"
              exit 1
            fi
          done

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          chmod 600 "$GOOGLE_PLAY_JSON_KEY" "$ANDROID_KEYSTORE_PATH"
          # Print SHA-1 for GCP Android OAuth client registration
          echo "=== Keystore SHA-1 fingerprint (register this in GCP → Credentials → Android OAuth client) ==="
          keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null \
            | grep -i "SHA1:" | head -1 || echo "keytool not available"

      # Write a minimal .env for the mobile app so Metro can embed the Supabase
      # config into the JS bundle at build time. Without this, EXPO_PUBLIC_* vars
      # are undefined in the bundle and the app crashes on first launch.
      # The values come from GitHub Variables set in Settings → Secrets and variables.
      - name: Write mobile app env
        run: |
          set -euo pipefail
          env_file="apps/mobile-app/.env"
          : > "$env_file"
          [ -n "${EXPO_PUBLIC_SUPABASE_PROFILE:-}" ]   && printf 'EXPO_PUBLIC_SUPABASE_PROFILE=%s\n'   "$EXPO_PUBLIC_SUPABASE_PROFILE"   >> "$env_file"
          [ -n "${EXPO_PUBLIC_SUPABASE_URL:-}" ]        && printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n'        "$EXPO_PUBLIC_SUPABASE_URL"        >> "$env_file"
          [ -n "${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}" ]   && printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n'   "$EXPO_PUBLIC_SUPABASE_ANON_KEY"   >> "$env_file"
          [ -n "${EXPO_PUBLIC_DIRECTUS_URL:-}" ]        && printf 'EXPO_PUBLIC_DIRECTUS_URL=%s\n'        "$EXPO_PUBLIC_DIRECTUS_URL"        >> "$env_file"
          [ -n "${AUTH_PROVIDER:-}" ]                   && printf 'AUTH_PROVIDER=%s\n'                   "$AUTH_PROVIDER"                   >> "$env_file"
          # EXPO_PUBLIC_AUTH_PROVIDER is the Metro-bundled form (EXPO_PUBLIC_ prefix required
          # for Expo to inline it into the React Native JS runtime).
          [ -n "${EXPO_PUBLIC_AUTH_PROVIDER:-}" ]       && printf 'EXPO_PUBLIC_AUTH_PROVIDER=%s\n'       "$EXPO_PUBLIC_AUTH_PROVIDER"       >> "$env_file"
          # EXPO_PUBLIC_SITE_URL is the web-relay origin used by getSupabaseOAuthRedirectUrl
          # for both Google OAuth (native relay) and magic-link emailRedirectTo.
          # Without this in the .env file, window.location.origin (localhost from Metro)
          # leaks into the redirect URL and Supabase/email clients land on localhost.
          [ -n "${EXPO_PUBLIC_SITE_URL:-}" ]            && printf 'EXPO_PUBLIC_SITE_URL=%s\n'            "$EXPO_PUBLIC_SITE_URL"            >> "$env_file"
          [ -n "${EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN:-}" ] && printf 'EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN=%s\n' "$EXPO_PUBLIC_NATIVE_GOOGLE_SIGNIN" >> "$env_file"
          [ -n "${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID:-}" ] && printf 'EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=%s\n' "$EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID" >> "$env_file"
          vars_written=$(grep -c '.' "$env_file" || true)
          echo "Wrote ${vars_written} env var(s) to ${env_file}"

      - name: Tune build memory limits
        run: |
          set -euo pipefail
          # Detect available RAM and set Gradle heap + parallelism accordingly.
          # This lets the same workflow run safely on t3a.large (8 GiB) and t3a.xlarge (16 GiB).
          TOTAL_MB=$(awk '/MemTotal/ {printf "%d", $2/1024}' /proc/meminfo)
          # On ≤9 GiB machines (t3a.large = 8 GiB): Node=3072 MiB + Gradle=2048 MiB +
          # Metaspace=512 MiB = 5632 MiB, leaving ~2.2 GiB for OS + runner.
          # Gradle at 2048 MiB is sufficient for orchestration; Metro (Node) does the heavy
          # JS bundling and OOM'd at 2036/2048 MiB, so the heap is redistributed toward Node.
          # (Previous: Node=2048+Gradle=3072 → Metro OOM. Before that: Node=3584+Gradle=4096 → OS SIGTERM.)
          if [ "$TOTAL_MB" -le 9216 ]; then
            GRADLE_MB=2048
            GRADLE_WORKERS=2
          else
            GRADLE_MB=$(( TOTAL_MB / 2 ))
            [ "$GRADLE_MB" -gt 8192 ] && GRADLE_MB=8192
            GRADLE_WORKERS=4
          fi
          echo "GRADLE_HEAP=-Xmx${GRADLE_MB}m" >> "$GITHUB_ENV"
          echo "GRADLE_WORKERS=${GRADLE_WORKERS}" >> "$GITHUB_ENV"
          echo "RAM: ${TOTAL_MB} MiB → Gradle heap: ${GRADLE_MB} MiB, workers: ${GRADLE_WORKERS}"

      # Set up ccache to cache C/C++ compilation units between builds.
      # On EC2, the cache directory lives on the persistent EBS volume so it survives
      # across builds. On the first warm run ccache will populate; on subsequent runs
      # (where Reanimated / RN native code hasn't changed) it returns compiled object
      # files from cache instead of recompiling — cutting CMake from ~30 min to seconds.
      #
      # The Gradle init script injects CMAKE_C/CXX_COMPILER_LAUNCHER=ccache into all
      # Android CMake builds. It survives expo prebuild --clean because it lives in
      # ~/.gradle/init.d/ (on EBS) rather than in the generated android/ directory.
      #
      # NOTE: heredoc content below must be indented 10 spaces so YAML includes it in
      # the literal block scalar; after YAML strips the common indent, the shell sees
      # each line at column 0 — the same pattern used by the node <<'NODE' block above.
      - name: Setup ccache
        if: inputs.runner != 'github-hosted'
        run: |
          set -euo pipefail
          if ! command -v ccache >/dev/null 2>&1; then
            if sudo -n true 2>/dev/null; then
              sudo apt-get update -q
              sudo apt-get install -y ccache
            else
              echo "sudo unavailable — downloading ccache binary to ~/.local/bin"
              mkdir -p "$HOME/.local/bin"
              CCACHE_VER=4.10.2
              curl -fsSL \
                "https://github.com/ccache/ccache/releases/download/v${CCACHE_VER}/ccache-${CCACHE_VER}-linux-x86_64.tar.xz" \
                | tar -xJ --strip-components=1 -C "$HOME/.local/bin" \
                    "ccache-${CCACHE_VER}-linux-x86_64/ccache"
              # GITHUB_PATH only takes effect in the next step; export for this step too.
              export PATH="$HOME/.local/bin:$PATH"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            fi
          fi

          CCACHE_DIR=/home/runner/.ccache
          ccache --set-config=cache_dir="${CCACHE_DIR}"
          ccache --set-config=max_size=4G
          # Skipping mtime in the hash avoids false cache misses in CI (files don't
          # change mid-build, so mtime drift is irrelevant and only slows hashing).
          ccache --set-config=hash_dir=false
          echo "CCACHE_DIR=${CCACHE_DIR}" >> "$GITHUB_ENV"

          mkdir -p "$HOME/.gradle/init.d"
          cat > "$HOME/.gradle/init.d/ccache.gradle" << 'GROOVY'
          // Injects ccache as CMake C/C++ compiler launcher for Android application builds.
          // Applied via Gradle init script so it works with Expo-generated android/ without
          // modifying any generated file (edits to android/app/build.gradle are lost on
          // expo prebuild --clean; this init script lives on EBS and survives those runs).
          gradle.allprojects { project ->
              project.afterEvaluate {
                  if (!project.plugins.hasPlugin("com.android.application")) return
                  def cmake = null
                  try {
                      cmake = project.android?.defaultConfig?.externalNativeBuild?.cmake
                  } catch (Exception ignored) {}
                  if (cmake == null) return
                  try {
                      cmake.arguments(
                          "-DCMAKE_C_COMPILER_LAUNCHER=ccache",
                          "-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
                      )
                      println "[ccache] Injected CMake compiler launcher: ccache"
                  } catch (Exception e) {
                      println "[ccache] Warning: could not inject CMake arguments: " + e.message
                  }
              }
          }
          GROOVY

          echo "Wrote ~/.gradle/init.d/ccache.gradle"
          ccache --show-stats

      - name: Configure Gradle
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle"
          # Overwrite (not append) so each run starts with exactly these settings.
          # Previous append (>>) caused duplicate properties and stale GRADLE_HEAP
          # values across runs, which also invalidated Gradle's configuration cache.
          # Heredoc content is indented 10 spaces so YAML includes it in the block
          # scalar; YAML strips the common indent so the shell sees it at column 0.
          cat > "$HOME/.gradle/gradle.properties" << EOF
          org.gradle.jvmargs=${GRADLE_HEAP} -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=${GRADLE_WORKERS}
          org.gradle.caching=true
          org.gradle.configuration-cache=true
          org.gradle.configuration-cache.problems=warn
          EOF

      - name: Ensure Android SDK is writable
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/opt/android-sdk}}"
          if [ -d "$sdk_root" ] && [ ! -w "$sdk_root" ]; then
            echo "Android SDK at $sdk_root is not writable — fixing ownership for runner user $(id -un)"
            if sudo -n true 2>/dev/null; then
              sudo chown -R "$(id -un)" "$sdk_root"
            else
              echo "Warning: sudo unavailable (no-new-privileges) — cannot fix SDK ownership. Build may fail if Gradle needs write access to $sdk_root."
            fi
          fi
          echo "Android SDK at $sdk_root is writable."

      # On the EC2 runner the android/ directory persists on EBS between runs
      # (it is gitignored so checkout's git clean -ffd leaves it intact).
      # When native-relevant config is unchanged we skip --clean and let Gradle
      # do a fully incremental build — cuts Release Android from ~30 min to ~3-5 min.
      #
      # The hash intentionally excludes version fields from app.json/package.json
      # because a bare version bump (patch release) does not affect native output.
      # Only Expo plugins, android/ios config, and the dependency tree trigger a
      # full prebuild + NDK recompile.
      - name: Conditional Expo prebuild
        run: |
          set -euo pipefail
          HASH_FILE="$HOME/.gradle/.prebuild-hash"
          ANDROID_DIR="apps/mobile-app/android"

          # Extract only the fields that drive native output.
          NATIVE_CONFIG=$(node -e "
            const app = require('./apps/mobile-app/app.json').expo;
            const pkg = require('./apps/mobile-app/package.json');
            console.log(JSON.stringify({
              plugins: app.plugins,
              android: app.android,
              ios: app.ios,
              dependencies: pkg.dependencies,
              devDependencies: pkg.devDependencies,
            }));
          " 2>/dev/null)
          CURRENT_HASH=$(printf '%s' "$NATIVE_CONFIG" && cat pnpm-lock.yaml 2>/dev/null)
          CURRENT_HASH=$(printf '%s' "$CURRENT_HASH" | sha256sum | cut -d' ' -f1)
          STORED_HASH=$(cat "$HASH_FILE" 2>/dev/null || echo "none")

          echo "Native config hash: $CURRENT_HASH (stored: $STORED_HASH)"

          if [ "$CURRENT_HASH" = "$STORED_HASH" ] && [ -d "$ANDROID_DIR" ]; then
            echo "Prebuild inputs unchanged — reusing cached android/ directory (incremental Gradle build)."
          else
            echo "Running expo prebuild --clean (native config changed or android/ missing)..."
            pnpm --dir apps/mobile-app exec expo prebuild \
              --platform android --clean
            printf '%s' "$CURRENT_HASH" > "$HASH_FILE"
            echo "Prebuild complete — hash stored for next run."
          fi
          # Always signal runFastlane to skip its own prebuild — the CI step owns it.
          # Without this, runFastlane re-runs expo prebuild --clean unconditionally,
          # wiping android/ and forcing a full Gradle rebuild every time.
          echo "SKIP_EXPO_PREBUILD=1" >> "$GITHUB_ENV"

      - name: Release Android
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "development" ]; then
            pnpm run android:release:dev
          else
            pnpm run android:release
          fi

      - name: Show ccache stats
        if: inputs.runner != 'github-hosted' && always()
        run: ccache --show-stats || true

  # Stops the EC2 runner after the build rather than waiting for the idle watchdog.
  # Grace period: waits 90 s then checks the GitHub API — if the runner picked up a
  # queued job in the meantime it is marked busy and we skip the stop so that job
  # can finish. The watchdog (600 s timeout) handles shutdown after that build.
  stop-runner:
    runs-on: ubuntu-latest
    needs: [release, start-runner]
    if: always() && needs.start-runner.result == 'success'
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_RUNNER_ROLE_ARN }}
          aws-region: ${{ vars.AWS_RUNNER_REGION || 'us-east-1' }}

      - name: Stop EC2 instance (queue-aware)
        env:
          INSTANCE_ID: ${{ vars.EC2_RUNNER_INSTANCE_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Wait long enough for the ephemeral runner to re-register and for GitHub
          # to dispatch any queued job to it (~5 s re-register + ~30 s dispatch + buffer).
          echo "Waiting 90 s for any queued builds to start on the runner..."
          sleep 90
          # Check if another Mobile Android Release is currently in progress or queued.
          # Uses the workflow runs API (accessible with actions:read) rather than the
          # runners API (/actions/runners requires manage_runners:org which GITHUB_TOKEN
          # cannot hold in org repos — previously returned 403, which concat'd with the
          # '|| echo 0' fallback produced a non-integer BUSY value, the integer comparison
          # then failed silently, and the instance was stopped mid-build).
          IN_PROGRESS=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=10&event=workflow_dispatch" \
            --jq "[.workflow_runs[] | select(.name == \"Mobile Android Release\") | select(.status == \"in_progress\" or .status == \"queued\") | select(.id != ${{ github.run_id }})] | length" \
            2>/dev/null) || IN_PROGRESS=""
          if ! [[ "$IN_PROGRESS" =~ ^[0-9]+$ ]]; then
            echo "Could not determine if another release is running (API error) — skipping stop to be safe."
            exit 0
          fi
          if [ "$IN_PROGRESS" -gt 0 ]; then
            echo "Another release is in progress or queued — skipping stop. Idle watchdog will shut down after that build."
            exit 0
          fi
          # No other release running — safe to stop now.
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          echo "Instance $INSTANCE_ID is: $STATE"
          case "$STATE" in
            running|pending)
              aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
              echo "Stop request sent." ;;
            stopped|stopping)
              echo "Already stopping/stopped — nothing to do." ;;
            *)
              echo "Unexpected state: $STATE — skipping stop." ;;
          esac
