name: Release Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Release environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - development
      bump:
        description: "Version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      skip_deploy:
        description: "Skip infra deploy after version bump"
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      EXPECTED_AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: hashpass-release-infra

      - name: Release infra
        run: >
          node packages/tools/scripts/release-infra-pipeline.js
          --env ${{ inputs.environment }}
          --bump ${{ inputs.bump }}
          ${{ inputs.skip_deploy && '--skip-deploy' || '' }}
