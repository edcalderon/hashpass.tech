name: Trigger mobile release on version tag

# A `v*` tag push is a reliable signal that a real release just landed on
# main, so this keeps native mobile in sync with every web/main update
# instead of requiring a manual `gh workflow run mobile-android-release.yml`
# after every release. As of 2026-07-13, tags are created by
# release-tag-on-merge.yml (fires when a develop -> main promotion PR
# merges, tags that exact merge commit) rather than by
# packages/tools/scripts/release.js's runGitTag directly — release.js's
# `main`-branch patch path still has tag-creation logic for manual/fallback
# use, but the normal flow no longer runs it. Either source produces the
# same `v*.*.*` tag shape this workflow reacts to.
#
# Internal track only, with auto-promote-alpha — matches the "temporary
# release posture" in CLAUDE.md (production dispatches stay paused, and
# alpha only promotes after internal succeeds on the same tag).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  actions: write

jobs:
  trigger-mobile-release:
    if: github.repository == 'hashpass-tech/hashpass.tech'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch mobile-android-release.yml for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run mobile-android-release.yml \
            --repo hashpass-tech/hashpass.tech \
            --ref "${{ github.ref_name }}" \
            --field environment=development \
            --field track=internal \
            --field auto_promote_alpha=true \
            --field alpha_release_status=completed \
            --field backend=fastlane \
            --field runner=aws-ec2
