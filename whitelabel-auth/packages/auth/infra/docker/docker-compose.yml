version: '3.8'

services:
  # Supabase PostgreSQL
  supabase-db:
    image: supabase/postgres:15.1.1.78
    container_name: whitelabel-auth-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Supabase Auth (GoTrue)
  supabase-auth:
    image: supabase/gotrue:v2.158.1
    container_name: whitelabel-auth-gotrue
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${REDIRECT_URLS:-http://localhost:3000/auth/callback}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "${GOOGLE_CLIENT_ID:+true}"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_SECRET}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: "${GITHUB_CLIENT_ID:+true}"
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GITHUB_SECRET}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token}
      GOTRUE_JWT_EXP: 3600
    ports:
      - "9999:9999"
    depends_on:
      supabase-db:
        condition: service_healthy

  # Supabase REST API (PostgREST)
  supabase-rest:
    image: postgrest/postgrest:v12.0.2
    container_name: whitelabel-auth-rest
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token}
    ports:
      - "3001:3000"
    depends_on:
      - supabase-db

  # Supabase Realtime
  supabase-realtime:
    image: supabase/realtime:v2.28.32
    container_name: whitelabel-auth-realtime
    environment:
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token}
      SECURE_CHANNELS: "false"
    ports:
      - "4000:4000"
    depends_on:
      - supabase-db

  # Directus
  directus:
    image: directus/directus:11.3.5
    container_name: whitelabel-auth-directus
    environment:
      KEY: ${DIRECTUS_KEY:-changeme}
      SECRET: ${DIRECTUS_SECRET:-changeme}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      DB_CLIENT: "pg"
      DB_CONNECTION_STRING: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@supabase-db:5432/postgres"
      WEBSOCKETS_ENABLED: "true"
      PUBLIC_URL: ${SITE_URL:-http://localhost:8055}
      
      # OAuth Configuration
      AUTH_PROVIDERS: "${GOOGLE_CLIENT_ID:+google,}${GITHUB_CLIENT_ID:+github}"
      AUTH_GOOGLE_DRIVER: "openid"
      AUTH_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      AUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_SECRET}
      AUTH_GOOGLE_REDIRECT_URL: "${SITE_URL:-http://localhost:3000}/auth/oauth/callback"
      AUTH_GITHUB_DRIVER: "oauth2"
      AUTH_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      AUTH_GITHUB_CLIENT_SECRET: ${GITHUB_SECRET}
      AUTH_GITHUB_REDIRECT_URL: "${SITE_URL:-http://localhost:3000}/auth/oauth/callback"
      
      # Sync Configuration
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-auth:9999}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.test}
      
      # CORS
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${SITE_URL:-http://localhost:3000}"
      CORS_METHODS: "GET,POST,PATCH,DELETE,OPTIONS"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_CREDENTIALS: "true"
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    depends_on:
      - supabase-db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8055/server/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sync Bridge Service (Optional)
  auth-sync:
    build:
      context: ./sync-bridge
      dockerfile: Dockerfile
    container_name: whitelabel-auth-sync
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-auth:9999}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_STATIC_TOKEN}
      SYNC_MODE: ${SYNC_MODE:-webhook}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-30000}
    depends_on:
      - supabase-db
      - directus
    profiles:
      - sync

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:

networks:
  default:
    name: whitelabel-auth-network
