version: "3.8"

# HashPass Self-Hosted Infrastructure
# Optimized for GCP e2-micro (1 vCPU, 1GB RAM)
#
# Components:
# - Directus: API, Auth, Admin UI
#
# External Dependencies:
# - PostgreSQL: Supabase Free Tier (or other)
# - Storage: GCS / S3 (configured in Directus)
# - Nginx: Installed directly on host
#
# Usage:
#   docker compose up -d
#   docker compose logs -f directus

services:
  directus:
    image: directus/directus:11.14.0
    container_name: hashpass-directus
    restart: unless-stopped
    
    # Only expose to localhost - Nginx will proxy
    ports:
      - "127.0.0.1:8055:8055"
    
    environment:
      # ===========================================
      # Core Configuration
      # ===========================================
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      NODE_ENV: production
      
      # Disable telemetry
      TELEMETRY: "false"
      
      # ===========================================
      # Database (External PostgreSQL)
      # ===========================================
      DB_CLIENT: pg
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "false"
      
      # Connection pooling (optimized for small instance)
      DB_POOL__MIN: 0
      DB_POOL__MAX: 5
      DB_POOL__IDLE_TIMEOUT_MILLIS: 30000
      
      # ===========================================
      # Admin User (Bootstrap)
      # ===========================================
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      
      # ===========================================
      # Public URL
      # ===========================================
      PUBLIC_URL: ${PUBLIC_URL:-https://sso.hashpass.co}
      
      # ===========================================
      # Authentication
      # ===========================================
      AUTH_PROVIDERS: "local,google"
      
      # JWT Configuration
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
      
      # Password policy
      AUTH_PASSWORD_POLICY: ${AUTH_PASSWORD_POLICY:-/^.{8,}$/}
      
      # ===========================================
      # OAuth Providers (optional)
      # ===========================================
      # Google OAuth
      AUTH_GOOGLE_DRIVER: oauth2
      AUTH_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_GOOGLE_AUTHORIZE_URL: https://accounts.google.com/o/oauth2/v2/auth
      AUTH_GOOGLE_ACCESS_URL: https://oauth2.googleapis.com/token
      AUTH_GOOGLE_PROFILE_URL: https://openidconnect.googleapis.com/v1/userinfo
      AUTH_GOOGLE_SCOPES: "openid profile email"
      AUTH_GOOGLE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_GOOGLE_DEFAULT_ROLE_ID: ${DEFAULT_ROLE_ID:-}
      AUTH_GOOGLE_REDIRECT_ALLOW_LIST: "http://localhost:8081/auth/callback,https://sso.hashpass.co/auth/callback"
      
      # Discord OAuth
      AUTH_DISCORD_DRIVER: oauth2
      AUTH_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      AUTH_DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      AUTH_DISCORD_AUTHORIZE_URL: https://discord.com/api/oauth2/authorize
      AUTH_DISCORD_ACCESS_URL: https://discord.com/api/oauth2/token
      AUTH_DISCORD_PROFILE_URL: https://discord.com/api/users/@me
      AUTH_DISCORD_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_DISCORD_DEFAULT_ROLE_ID: ${DEFAULT_ROLE_ID:-}
      
      # ===========================================
      # Storage (Cloud)
      # ===========================================
      STORAGE_LOCATIONS: cloud
      STORAGE_CLOUD_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_CLOUD_BUCKET: ${STORAGE_BUCKET}
      STORAGE_CLOUD_REGION: ${STORAGE_REGION}
      STORAGE_CLOUD_KEY: ${STORAGE_KEY}
      STORAGE_CLOUD_SECRET: ${STORAGE_SECRET}
      STORAGE_CLOUD_ENDPOINT: ${STORAGE_ENDPOINT:-}
      
      # ===========================================
      # Email (SMTP)
      # ===========================================
      EMAIL_FROM: ${EMAIL_FROM:-noreply@hashpass.tech}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-smtp}
      EMAIL_SMTP_HOST: ${SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_SMTP_SECURE: ${SMTP_SECURE:-false}
      
      # ===========================================
      # Rate Limiting
      # ===========================================
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: memory
      RATE_LIMITER_POINTS: 100
      RATE_LIMITER_DURATION: 60
      
      # ===========================================
      # CORS (Allow your frontend domains)
      # ===========================================
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hashpass.co,https://www.hashpass.co,https://sso.hashpass.co,http://localhost:8081}
      CORS_CREDENTIALS: "true"
      
      # ===========================================
      # Caching (Disabled for e2-micro)
      # ===========================================
      CACHE_ENABLED: "false"
      
      # ===========================================
      # Logging
      # ===========================================
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_STYLE: pretty
      
      # ===========================================
      # WebSockets (Realtime)
      # ===========================================
      WEBSOCKETS_ENABLED: "true"
      WEBSOCKETS_REST_ENABLED: "true"
      WEBSOCKETS_GRAPHQL_ENABLED: "false"
      
    # Memory limits for e2-micro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/server/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Persist uploads and extensions (if using local storage)
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  directus_uploads:
  directus_extensions:

networks:
  default:
    name: hashpass-network
