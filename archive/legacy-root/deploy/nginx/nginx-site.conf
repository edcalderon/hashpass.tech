# Nginx Configuration for HashPass API
# Location: /etc/nginx/sites-available/api.hashpass.tech
#
# Setup:
#   1. Copy this file: sudo cp nginx-site.conf /etc/nginx/sites-available/api.hashpass.tech
#   2. Enable site: sudo ln -s /etc/nginx/sites-available/api.hashpass.tech /etc/nginx/sites-enabled/
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#   5. Get SSL: sudo certbot --nginx -d api.hashpass.tech

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream for Directus
upstream directus {
    server 127.0.0.1:8055;
    keepalive 32;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.hashpass.tech;
    
    # Allow Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hashpass.tech;
    
    # ===========================================
    # SSL Configuration (Certbot will manage)
    # ===========================================
    ssl_certificate /etc/letsencrypt/live/api.hashpass.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hashpass.tech/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.hashpass.tech/chain.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # ===========================================
    # Security Headers
    # ===========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ===========================================
    # Logging
    # ===========================================
    access_log /var/log/nginx/api.hashpass.tech.access.log;
    error_log /var/log/nginx/api.hashpass.tech.error.log;
    
    # ===========================================
    # General Settings
    # ===========================================
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Gzip compression
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1000;
    
    # ===========================================
    # Health Check (no auth required)
    # ===========================================
    location /server/health {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No rate limiting for health checks
        access_log off;
    }
    
    # ===========================================
    # WebSocket Support for Realtime
    # ===========================================
    location /websocket {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Disable buffering for realtime
        proxy_buffering off;
    }
    
    # ===========================================
    # Auth Endpoints (with rate limiting)
    # ===========================================
    location /auth/ {
        # Rate limiting: 10 requests per second with burst
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection keep-alive
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # ===========================================
    # API Endpoints
    # ===========================================
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 50;
        
        proxy_pass http://directus;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Intercept errors
        proxy_intercept_errors on;
    }
    
    # ===========================================
    # Assets/Uploads (cached)
    # ===========================================
    location /assets/ {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache headers for assets
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
        
        # Allow larger files for uploads
        client_max_body_size 100M;
    }
    
    # ===========================================
    # Admin Panel
    # ===========================================
    location /admin {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # IP whitelist for admin (optional - uncomment to restrict)
        # allow 1.2.3.4;
        # deny all;
    }
    
    # ===========================================
    # Error Pages
    # ===========================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
