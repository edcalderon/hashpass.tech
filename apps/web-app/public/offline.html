<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050816" />
    <title>HASHPASS Club is offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --panel: rgba(9, 16, 32, 0.92);
        --panel-border: rgba(130, 160, 255, 0.18);
        --text: #f6f8ff;
        --muted: rgba(246, 248, 255, 0.72);
        --accent: #4ea3ff;
        --accent-2: #5ff0d3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(78, 163, 255, 0.18), transparent 40%),
          radial-gradient(circle at bottom right, rgba(95, 240, 211, 0.14), transparent 34%),
          linear-gradient(180deg, #071021 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(100%, 560px);
        padding: 32px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(95, 240, 211, 0.22);
        background: rgba(95, 240, 211, 0.08);
        color: var(--accent-2);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 0 6px rgba(95, 240, 211, 0.14);
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 1rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      .primary {
        color: #08111f;
        background: linear-gradient(135deg, #7dc4ff 0%, #5ff0d3 100%);
        box-shadow: 0 18px 40px rgba(78, 163, 255, 0.24);
      }

      .secondary {
        color: var(--text);
        border: 1px solid rgba(246, 248, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
      }

      a:hover {
        transform: translateY(-1px);
      }

      .meta {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid rgba(246, 248, 255, 0.08);
        font-size: 0.92rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background:
          radial-gradient(circle at 30% 30%, rgba(95, 240, 211, 0.9), transparent 36%),
          linear-gradient(135deg, rgba(78, 163, 255, 0.95), rgba(95, 240, 211, 0.9));
        box-shadow: 0 14px 30px rgba(78, 163, 255, 0.28);
      }

      .brand-copy {
        display: flex;
        flex-direction: column;
      }

      .brand-name {
        font-size: 0.96rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .brand-url {
        color: var(--muted);
        font-size: 0.86rem;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="brand" aria-hidden="true">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <div class="brand-name">HASHPASS Club</div>
          <div class="brand-url">hashpass.club</div>
        </div>
      </div>
      <span class="badge"><span class="badge-dot"></span>Offline mode</span>
      <h1>You are offline.</h1>
      <p>
        The app is still installed, but this page cannot reach the network right now.
        Reconnect and refresh to load the latest content.
      </p>
      <div class="actions">
        <a class="primary" href="/">Retry home</a>
        <a class="secondary" href="https://hashpass.club">Open site</a>
      </div>
      <p class="meta">Cached app resources will continue to work while you are offline.</p>
    </main>
  </body>
</html>
