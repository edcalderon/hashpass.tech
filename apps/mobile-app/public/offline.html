<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05070c" />
    <title>HASHPASS | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Noto Sans", "Segoe UI", sans-serif;
        background: #05070c;
        color: #fcfcfc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 75% 15%, rgba(51, 255, 204, 0.16), transparent 34%),
          #05070c;
      }

      main {
        width: min(100%, 560px);
        padding: 42px;
        border: 1px solid rgba(51, 255, 204, 0.28);
        border-radius: 28px;
        background: rgba(11, 20, 32, 0.92);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(2rem, 7vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: #b8c4ce;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      button {
        min-height: 48px;
        padding: 0 24px;
        border: 0;
        border-radius: 999px;
        background: #33ffcc;
        color: #05070c;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/pwa-icon-192.png" alt="" />
      <h1>You're offline.</h1>
      <p>
        HASHPASS could not reach the network. Reconnect to load current event,
        ticket, agenda, and networking information.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
