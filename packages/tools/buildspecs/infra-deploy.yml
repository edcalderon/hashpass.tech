version: 0.2

env:
  shell: bash
  variables:
    PNPM_STORE_DIR: .pnpm-store

cache:
  key: pnpm-$(codebuild-hash-files pnpm-lock.yaml pnpm-workspace.yaml)
  paths:
    - .pnpm-store/**/*

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - corepack enable
      - export PNPM_VERSION="$(node packages/tools/scripts/resolve-pnpm-version.js)"
      - corepack prepare pnpm@${PNPM_VERSION} --activate
      - pnpm config set store-dir ${PNPM_STORE_DIR}
      - pnpm --version
  pre_build:
    commands:
      - export ROUTE53_ZONE_ID="$(bash packages/tools/scripts/check-infra-dns.sh --print-zone-id)"
      - export CI=1
      - rm -rf node_modules
      - pnpm install --frozen-lockfile --prefer-offline
  build:
    commands:
      - echo "Deploying infra stage ${TARGET_STAGE}"
      - pnpm --filter @hashpass/infra run deploy:${TARGET_STAGE}
