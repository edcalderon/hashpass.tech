customHeaders:
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: 'no-store, no-cache, must-revalidate, max-age=0, s-maxage=0'
      - key: Pragma
        value: 'no-cache'
      - key: Expires
        value: '0'
  - pattern: 'index.html'
    headers:
      - key: Cache-Control
        value: 'no-store, no-cache, must-revalidate, max-age=0, s-maxage=0'
      - key: Pragma
        value: 'no-cache'
      - key: Expires
        value: '0'
  - pattern: 'sw.js'
    headers:
      - key: Cache-Control
        value: 'no-store, no-cache, must-revalidate, max-age=0, s-maxage=0'
      - key: Pragma
        value: 'no-cache'
      - key: Expires
        value: '0'
  - pattern: 'manifest.json'
    headers:
      - key: Cache-Control
        value: 'no-cache, must-revalidate, max-age=0, s-maxage=0'
  - pattern: '_expo/static/**/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: 'assets/**/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
