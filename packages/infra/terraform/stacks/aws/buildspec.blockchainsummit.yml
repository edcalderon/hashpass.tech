version: 1.0
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22.22.0
        - corepack enable pnpm || true
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter hashpass-mobile-app build
        - cp -r apps/mobile-app/dist/server/. apps/mobile-app/dist/client/
  artifacts:
    baseDirectory: apps/mobile-app/dist/client
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*
