version: 1.0
frontend:
  phases:
    preBuild:
      commands:
        # Note: amplify/ folder has been permanently renamed to amplify-backend-config/
        # to prevent Amplify CLI from auto-detecting and initializing it
        - 'echo "Using amplify-backend-config/ folder (renamed from amplify/ to prevent auto-init)"'
        # Disable Amplify CLI backend initialization (we only use Amplify for static hosting)
        - export AMPLIFY_SKIP_BACKEND_BUILD=true
        - export AMPLIFY_DISABLE_TS=true
        - 'echo "Skipping Amplify CLI backend initialization for static hosting"'
        - nvm install 22.22.0
        - corepack enable pnpm || true
        - |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --include=dev
          else
            npm install
          fi
        - pip install awscli --upgrade --user
        - 'export PATH=~/.local/bin:$PATH'
        # Detect branch and set profile for environment propagation
        - |
          if [ "$AWS_BRANCH" = "main" ]; then
            PROFILE="production"
          elif [ "$AWS_BRANCH" = "develop" ]; then
            PROFILE="staging"
          else
            PROFILE="staging"
          fi
          echo "📡 Propagating environment for profile: $PROFILE"
          npm run env:propagate $PROFILE
        - 'echo "Building for branch: $AWS_BRANCH"'
    build:
      commands:
        - rm -rf dist apps/web-app/dist
        - mkdir -p dist/client/_expo/functions/api/bslatam
        # Use higher memory allowance to support more workers safely
        - export NODE_OPTIONS="--max-old-space-size=6144"
        - export NODE_MAX_OLD_SPACE_SIZE=6144
        # Restore parallel building to reduce bundling time for API routes
        - export EXPO_EXPORT_MAX_WORKERS=4
        # Set production environment for Expo export
        - export NODE_ENV=production
        # Skip package-level postbuild in CI; equivalent copy steps run below in amplify.yml
        - export SKIP_WEB_POSTBUILD=1
        - export EXPO_PUBLIC_ENABLE_STATIC_EXPORT=true
        # Run build using the unified command (pnpm if lockfile present)
        - '[ -f pnpm-lock.yaml ] && pnpm run build:web || npm run build:web'
        # Ensure no lingering Node workers keep memory pinned before copy steps
        - pkill -9 -x node || true
        - sleep 3
        - cp -r apps/web-app/dist/* ./dist/
        - cp -r dist/server/* dist/client/
        # Amplify artifact upload skips hidden directories; normalize Expo asset paths off ".pnpm"
        - node tools/scripts/normalize-expo-hidden-asset-paths.mjs dist/client
        - mkdir -p dist/client/config
        - cp config/versions.json dist/client/config/versions.json 2>/dev/null || cp apps/web-app/config/versions.json dist/client/config/versions.json 2>/dev/null || true
        - cp apps/web-app/public/sw.js dist/client/sw.js 2>/dev/null || cp public/sw.js dist/client/sw.js 2>/dev/null || true
        - mkdir -p amplify-backend-config/backend/function/bslApi/src/server/_expo/functions
        - rm -rf amplify-backend-config/backend/function/bslApi/src/server/_expo/functions/api || true
        - cp -r dist/server/_expo/functions/api amplify-backend-config/backend/function/bslApi/src/server/_expo/functions/
        - 'echo "<!-- Build timestamp: $(date) -->" >> dist/client/index.html'
        - |
          if [ "$AWS_BRANCH" = "main" ] || [ "${AMPLIFY_BUILD_STORYBOOK:-false}" = "true" ]; then
            echo "=== Building Storybook static site ==="
            npm run build:storybook || echo "Storybook build failed, continuing..."
          else
            echo "=== Skipping Storybook build for branch: $AWS_BRANCH ==="
            rm -rf storybook-static || true
          fi
        - |
          if [ -d storybook-static ]; then
            mkdir -p dist/client/storybook
            cp -r storybook-static/* dist/client/storybook/
            echo "Storybook files copied to dist/client/storybook/"
          else
            echo "Storybook static directory not found, skipping..."
          fi
        - 'echo "=== API files in dist/client/_expo/functions/api/bslatam/ ==="'
        - ls -la dist/client/_expo/functions/api/bslatam/ || echo "No API files found"
        - 'echo "=== Contents of dist/client/ ==="'
        - ls -la dist/client/
        - ls -la dist/client/index.html
    post_build:
      commands:
        # Deploy Lambda function automatically with frontend
        # This ensures API and frontend are always in sync
        - echo "📦 Packaging Lambda function..."
        - chmod +x tools/scripts/package-lambda.sh
        - ./tools/scripts/package-lambda.sh
        - |
          if [ -f lambda-deployment.zip ]; then
            # Branch-aware Lambda function target
            if [ "$AWS_BRANCH" = "develop" ] || [ "$AWS_BRANCH" = "dev" ]; then
              LAMBDA_FUNCTION_NAME="hashpass-dev-api"
            else
              LAMBDA_FUNCTION_NAME="hashpass-prod-api"
            fi
            echo "🚀 Deploying Lambda function: $LAMBDA_FUNCTION_NAME"
            echo "Current branch: $AWS_BRANCH"
            
            # Deploy Lambda and capture result
            if aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION_NAME \
              --region us-east-1 \
              --zip-file fileb://lambda-deployment.zip; then
              echo "✅ Lambda function deployment completed successfully"
              # Cleanup
              rm -f lambda-deployment.zip || true
            else
              LAMBDA_EXIT_CODE=$?
              echo "❌ Lambda deployment failed with exit code: $LAMBDA_EXIT_CODE"
              rm -f lambda-deployment.zip || true
              
              # CRITICAL: Fail the build on main branch if Lambda deployment fails
              if [ "$AWS_BRANCH" = "main" ]; then
                echo "🚨 FATAL: Lambda deployment failed on main branch - failing build"
                exit 1
              else
                echo "⚠️  Lambda deployment failed on non-main branch - continuing build"
              fi
            fi
          else
            echo "⚠️  lambda-deployment.zip not found"
            # CRITICAL: Fail the build on main branch if packaging failed
            if [ "$AWS_BRANCH" = "main" ]; then
              echo "🚨 FATAL: Lambda packaging failed on main branch - failing build"
              exit 1
            else
              echo "⚠️  Lambda packaging failed on non-main branch - continuing build"
            fi
          fi
  artifacts:
    baseDirectory: dist/client
    files:
      - '**/*'
    customHeaders:
      - pattern: '_expo/static/**/*'
        headers:
          - key: Cache-Control
            value: 'public, max-age=31536000, immutable'
      - pattern: 'index.html'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate'
          - key: Pragma
            value: 'no-cache'
          - key: Expires
            value: '0'
      - pattern: '**/*.html'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate'
          - key: Pragma
            value: 'no-cache'
          - key: Expires
            value: '0'
      - pattern: '**/*.js'
        headers:
          - key: Cache-Control
            value: 'public, max-age=31536000, immutable'
      - pattern: 'storybook/**/*'
        headers:
          - key: Cache-Control
            value: 'public, max-age=31536000, immutable'
      - pattern: 'storybook/index.html'
        headers:
          - key: Cache-Control
            value: 'no-cache, no-store, must-revalidate'
          - key: Pragma
            value: 'no-cache'
          - key: Expires
            value: '0'
  cache:
    paths:
      - .turbo/**/*
      - apps/web-app/.expo/**/*
redirects:
  - source: '/sw.js'
    status: 200
    target: '/sw.js'
  - source: '/_expo/*'
    status: 200
    target: '/_expo/'
  - source: '/events/bsl2025/*'
    status: 200
    target: '/index.html'
  - source: '/events/*'
    status: 200
    target: '/index.html'
  - source: '/auth'
    status: 200
    target: '/index.html'
  - source: '/auth/'
    status: 200
    target: '/index.html'
  - source: '/auth/*'
    status: 200
    target: '/index.html'
  - source: '/dashboard/*'
    status: 200
    target: '/index.html'
  - source: '/status'
    status: 200
    target: '/index.html'
  - source: '/status/*'
    status: 200
    target: '/index.html'
  - source: '/'
    status: 200
    target: '/index.html'
  - source: '/<*>'
    status: 200
    target: '/index.html'
  - source: '/storybook'
    status: 200
    target: '/storybook/index.html'
  - source: '/storybook/*'
    status: 200
    target: '/storybook/index.html'
customErrorResponses:
  - errorCode: 404
    responsePagePath: '/index.html'
    responseCode: 200
    errorCachingMinTTL: 0
